services:
  postgres:
    image: postgis/postgis:15-3.3
    platform: linux/amd64
    container_name: zatyshok_db
    restart: always
    environment:
      POSTGRES_USER: zatyshok_user
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: zatyshok
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zatyshok_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
